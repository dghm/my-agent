<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會議記錄工作台</title>
<link rel="stylesheet" href="dghm-ui.css">
<style>
  /* ---- Tool-specific layout ---- */
  .app { height: 100vh; }
  .form-panel {
    width: 460px;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 20px;
    background: var(--surface-panel-bg);
    border-right: 1px solid var(--surface-border);
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .draft-actions { display: flex; gap: 8px; margin: 0 0 16px; flex-wrap: wrap; }
  .draft-actions button { font-size: 12px; padding: 6px 10px; }
  .home-link { display: inline-block; margin-bottom: 8px; }
  button { padding: 6px 12px; font-size: 12px; }

  /* ---- 會議記錄大輸入框 ---- */
  #f_notes { min-height: 340px; font-size: 14px; line-height: 1.7; }
  #f_summary { min-height: 120px; line-height: 1.6; }
  .notes-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .marker-hint {
    font-size: 12px; color: var(--surface-text-muted);
    line-height: 1.7; margin: 6px 0 0;
  }
  .marker-hint code {
    background: var(--surface-input-bg);
    border: 1px solid var(--surface-input-border);
    border-radius: 4px; padding: 0 5px; font-size: 12px;
  }

  /* ---- Output panel ---- */
  .output-panel { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
  .output-title { font-size: 13px; font-weight: 700; color: var(--navy-text); margin: 0 0 8px; }
  .output-actions { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
  .copy-status { font-size: 12px; color: #1a7f4b; font-weight: 600; }
  #out-md {
    flex: 1; width: 100%; font-family: "SF Mono", Menlo, monospace; font-size: 12px;
    border: 1px solid var(--surface-input-border); border-radius: 8px; padding: 12px; resize: none;
    background: var(--surface-input-bg); color: var(--surface-text);
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============ FORM PANEL ============ -->
  <div class="form-panel">
    <div class="form-head">
      <div>
        <a href="index.html" class="home-link">← 返回首頁</a>
        <h1>會議記錄工作台</h1>
        <p class="hint">填好基本資訊後，開會過程全部記在同一個大輸入框，右側即時產生會議紀錄 Markdown，可直接複製或下載。</p>
      </div>
      <button id="theme-toggle" type="button" aria-label="切換 Dark／Day 模式" title="切換深色／淺色模式">🌙</button>
    </div>

    <div class="draft-actions">
      <button type="button" class="secondary" id="save-draft-btn">💾 下載草稿 JSON</button>
      <button type="button" class="secondary" id="load-draft-btn">📂 載入草稿 JSON</button>
      <input type="file" id="load-draft-input" accept="application/json" style="display:none">
    </div>

    <form id="form">

      <fieldset>
        <legend>01 — 基本資訊</legend>
        <div class="row2">
          <div>
            <label>會議日期</label>
            <input type="date" id="f_date">
          </div>
          <div>
            <label>會議時間</label>
            <input type="text" id="f_time" placeholder="例：14:00–15:30">
          </div>
        </div>

        <label>客戶名稱</label>
        <input type="text" id="f_client" placeholder="例：DGHM Design">

        <label>會議方式</label>
        <select id="f_method">
          <option value="Google Meet">Google Meet</option>
          <option value="LINE">LINE</option>
          <option value="電話">電話</option>
          <option value="現場會議">現場會議</option>
          <option value="其他">其他</option>
        </select>

        <label>與會者</label>
        <input type="text" id="f_attendees" placeholder="例：客戶 Alice、Kevin／我方 Aries">
      </fieldset>

      <fieldset>
        <legend>02 — 會議記錄</legend>
        <div class="notes-toolbar">
          <button type="button" class="secondary" id="timestamp-btn">🕐 插入時間戳記</button>
        </div>
        <textarea id="f_notes" placeholder="開會過程直接往下記，不用分類、不用照順序。&#10;&#10;[14:05] 客戶想在首頁加客戶見證區塊&#10;! 決議：本季先做內容更新，改版排下一季&#10;@ 我方：7/20 前提供首頁調整報價"></textarea>
        <p class="marker-hint">
          行首打 <code>!</code> 代表重點／決議、<code>@</code> 代表待辦，
          會後按下方「整理總結」自動抽出來，其他內容照常隨手記即可。
        </p>
      </fieldset>

      <fieldset>
        <legend>03 — 會議總結</legend>
        <div class="notes-toolbar">
          <button type="button" class="secondary" id="summarize-btn">✨ 從記錄整理總結</button>
          <span class="copy-status" id="summarize-status"></span>
        </div>
        <textarea id="f_summary" placeholder="會後補上結論；或先在記錄裡用 ! 和 @ 標記，一鍵整理到這裡再修。"></textarea>
      </fieldset>

    </form>
  </div>

  <!-- ============ OUTPUT PANEL ============ -->
  <div class="output-panel">
    <p class="output-title">Markdown 輸出（即時更新）</p>
    <div class="output-actions">
      <button type="button" class="secondary" id="copy-btn">複製 Markdown</button>
      <button type="button" class="secondary" id="download-md-btn">下載 .md</button>
      <button type="button" class="secondary" id="download-txt-btn">下載 .txt</button>
      <button type="button" class="danger" id="clear-btn">清空表單</button>
      <span class="copy-status" id="copy-status"></span>
    </div>
    <textarea id="out-md" readonly spellcheck="false"></textarea>
  </div>

</div>

<script src="dghm-ui.js"></script>
<script>
/* Dark / Day 模式（僅編輯介面，輸出的 Markdown 不受影響） */
initTheme('dghm-meeting-notes-theme');

var STORAGE_KEY = 'dghm-meeting-notes-draft-v3';
var FIELD_IDS = ['f_date', 'f_time', 'f_client', 'f_method', 'f_attendees', 'f_notes', 'f_summary'];

function v(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

/* ============================================================
   Markdown 輸出
   ============================================================ */
function getMeetingSlug() {
  var date = v('f_date') || new Date().toISOString().slice(0, 10);
  var yymmdd = date.replace(/-/g, '').slice(2);
  return { filePrefix: 'MM-' + yymmdd, slug: 'mm-' + yymmdd };
}

function buildDoc() {
  var today = new Date().toISOString().slice(0, 10);
  var date = v('f_date') || today;
  var client = v('f_client') || '（客戶待補）';

  return '---\n' +
    'title: ' + date + '｜' + client + ' 會議紀錄\n' +
    'date: ' + date + '\n' +
    'slug: ' + getMeetingSlug().slug + '\n' +
    '---\n\n' +
    '# 會議紀錄\n\n' +
    '- **客戶：** ' + client + '\n' +
    '- **會議時間：** ' + date + ' ' + (v('f_time') || '（時間待補）') + '\n' +
    '- **會議方式：** ' + v('f_method') + '\n' +
    '- **與會者：** ' + (v('f_attendees') || '（與會者待補）') + '\n\n' +
    '---\n\n' +
    '## 會議記錄\n\n' +
    (v('f_notes') || '（無）') + '\n\n' +
    '## 會議總結\n\n' +
    (v('f_summary') || '（無）') + '\n';
}

function refreshOutput() {
  document.getElementById('out-md').value = buildDoc();
}

/* ============================================================
   會議中快速記錄輔助：插入時間戳記、抽出總結
   ============================================================ */
document.getElementById('timestamp-btn').addEventListener('click', function () {
  var ta = document.getElementById('f_notes');
  var now = new Date();
  var hhmm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  var pos = ta.selectionStart;
  var atLineStart = pos === 0 || ta.value.charAt(pos - 1) === '\n';
  var stamp = (atLineStart ? '' : '\n') + '[' + hhmm + '] ';
  ta.setRangeText(stamp, pos, ta.selectionEnd, 'end');
  ta.focus();
  refreshOutput();
  saveDraft();
});

document.getElementById('summarize-btn').addEventListener('click', function () {
  var status = document.getElementById('summarize-status');
  var decisions = [];
  var todos = [];
  v('f_notes').split('\n').forEach(function (line) {
    var trimmed = line.trim();
    if (/^[!！]/.test(trimmed)) decisions.push(trimmed.replace(/^[!！]\s*/, ''));
    else if (/^[@＠]/.test(trimmed)) todos.push(trimmed.replace(/^[@＠]\s*/, ''));
  });

  if (!decisions.length && !todos.length) {
    status.textContent = '記錄裡沒有 ! 或 @ 開頭的行';
    setTimeout(function () { status.textContent = ''; }, 2500);
    return;
  }

  var parts = [];
  if (decisions.length) {
    parts.push('### 重點與決議\n' + decisions.map(function (t) { return '- ' + t; }).join('\n'));
  }
  if (todos.length) {
    parts.push('### 待辦事項\n' + todos.map(function (t) { return '- [ ] ' + t; }).join('\n'));
  }

  var ta = document.getElementById('f_summary');
  ta.value = (ta.value.trim() ? ta.value.trim() + '\n\n' : '') + parts.join('\n\n');
  status.textContent = '已整理 ' + (decisions.length + todos.length) + ' 條';
  setTimeout(function () { status.textContent = ''; }, 2000);
  refreshOutput();
  saveDraft();
});

/* ============================================================
   輸出動作：複製 / 下載 / 清空
   ============================================================ */
document.getElementById('copy-btn').addEventListener('click', function () {
  var status = document.getElementById('copy-status');
  navigator.clipboard.writeText(document.getElementById('out-md').value).then(function () {
    status.textContent = '已複製！';
    setTimeout(function () { status.textContent = ''; }, 1500);
  }, function () {
    status.textContent = '複製失敗，請手動選取後複製';
    setTimeout(function () { status.textContent = ''; }, 2000);
  });
});

function downloadDoc(ext) {
  var blob = new Blob([buildDoc()], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = getMeetingSlug().filePrefix + '.' + ext;
  a.click();
}
document.getElementById('download-md-btn').addEventListener('click', function () { downloadDoc('md'); });
document.getElementById('download-txt-btn').addEventListener('click', function () { downloadDoc('txt'); });

document.getElementById('clear-btn').addEventListener('click', function () {
  if (!confirm('確定要清空整份表單？（此動作無法復原）')) return;
  FIELD_IDS.forEach(function (id) {
    var el = document.getElementById(id);
    if (el) el.value = id === 'f_method' ? 'Google Meet' : '';
  });
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  refreshOutput();
});

/* ============================================================
   草稿：localStorage 自動儲存 ＋ 下載／載入 JSON
   ============================================================ */
function collectDraft() {
  var draft = { fields: {} };
  FIELD_IDS.forEach(function (id) { draft.fields[id] = document.getElementById(id).value; });
  return draft;
}

function applyDraft(draft) {
  FIELD_IDS.forEach(function (id) {
    if (draft.fields && id in draft.fields) {
      var el = document.getElementById(id);
      if (el) el.value = draft.fields[id];
    }
  });
  refreshOutput();
}

function saveDraft() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collectDraft())); } catch (e) {}
}

document.getElementById('save-draft-btn').addEventListener('click', function () {
  var blob = new Blob([JSON.stringify(collectDraft(), null, 2)], { type: 'application/json;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = getMeetingSlug().filePrefix + '-草稿.json';
  a.click();
});

document.getElementById('load-draft-btn').addEventListener('click', function () {
  document.getElementById('load-draft-input').click();
});

document.getElementById('load-draft-input').addEventListener('change', function (e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function () {
    try {
      var draft = JSON.parse(reader.result);
      applyDraft(draft);
      saveDraft();
    } catch (err) {
      alert('草稿檔案格式錯誤，無法載入。');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ============================================================
   初始化
   ============================================================ */
document.querySelector('.form-panel').addEventListener('input', function () {
  refreshOutput();
  saveDraft();
});

(function init() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { applyDraft(JSON.parse(raw)); return; }
  } catch (e) {}
  refreshOutput();
})();
</script>
</body>
</html>
