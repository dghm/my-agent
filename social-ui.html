<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社群文案工作台</title>
  <style>
    :root {
      --bg: #f3f6fc;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5a6478;
      --line: #d8deea;
      --brand: #1f2f8f;
      --accent: #1f9acb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 6px;
      color: var(--brand);
      font-size: 28px;
    }
    .hint {
      margin: 0 0 16px;
      font-size: 14px;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input, pre {
      width: 100%;
      border: 1px solid #c7d1e5;
      border-radius: 8px;
    }
    input {
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background: var(--brand);
    }
    button.secondary { background: var(--accent); }
    button.dark { background: #2b2f3b; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }
    h2 {
      margin: 18px 0 8px;
      color: var(--brand);
      font-size: 18px;
      border-left: 4px solid var(--accent);
      padding-left: 8px;
    }
    pre {
      margin: 0;
      background: #0e1522;
      color: #e7edf8;
      padding: 14px;
      min-height: 260px;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.6;
    }
    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>社群文案工作台</h1>
    <p class="hint">輸入主題後，會呼叫 `social-post-agent.js` 自動搜尋資料並生成 Facebook 貼文。</p>

    <label for="topic">主題關鍵字</label>
    <input id="topic" placeholder="例：中小企業如何用 AI 減少行政成本" />

    <div class="actions">
      <button id="runBtn" onclick="runSocial()">生成社群文案</button>
      <button class="secondary" onclick="copyOutput()">複製結果</button>
      <button class="dark" onclick="clearOutput()">清空</button>
    </div>
    <div class="status" id="status">狀態：待命中</div>

    <h2>輸出內容</h2>
    <pre id="output">按下「生成社群文案」後，結果會顯示在這裡。</pre>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const API_BASE = "http://localhost:8780";

    function setStatus(text) {
      document.getElementById("status").textContent = `狀態：${text}`;
    }

    async function runSocial() {
      const topic = document.getElementById("topic").value.trim();
      if (!topic) {
        setStatus("請先輸入主題關鍵字");
        return;
      }
      const runBtn = document.getElementById("runBtn");
      runBtn.disabled = true;
      setStatus("生成中，請稍候...");
      document.getElementById("meta").textContent = "";
      try {
        const res = await fetch(`${API_BASE}/api/social/generate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || "生成失敗");
        }
        document.getElementById("output").textContent = data.output || "(無內容)";
        document.getElementById("meta").textContent = `已儲存：${data.outputFile}`;
        setStatus("生成完成");
      } catch (err) {
        setStatus(`失敗：${err.message}`);
      } finally {
        runBtn.disabled = false;
      }
    }

    async function copyOutput() {
      const text = document.getElementById("output").textContent;
      await navigator.clipboard.writeText(text);
      setStatus("已複製到剪貼簿");
    }

    function clearOutput() {
      document.getElementById("output").textContent = "按下「生成社群文案」後，結果會顯示在這裡。";
      document.getElementById("meta").textContent = "";
      setStatus("已清空");
    }
  </script>
</body>
</html>
