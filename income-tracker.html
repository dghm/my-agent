<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGHM 接案收入登記系統</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --navy: #0D2F6E;
    --orange: #E5622A;
    --surface-bg: #F4F6F8;
    --surface-panel-bg: #ffffff;
    --surface-border: #E1E5EA;
    --surface-text: #1f2933;
    --surface-text-muted: #667085;
    --surface-input-bg: #ffffff;
    --surface-input-border: #D0D5DD;
  }
  :root[data-theme="dark"] {
    --surface-bg: #161b22;
    --surface-panel-bg: #1f2530;
    --surface-border: #323a47;
    --surface-text: #e6e9ef;
    --surface-text-muted: #9aa4b2;
    --surface-input-bg: #2a313d;
    --surface-input-border: #3d4654;
  }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    margin: 0;
    background: var(--surface-bg);
    color: var(--surface-text);
  }
  .app { display: flex; height: 100vh; }

  .form-panel {
    width: 380px;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 20px;
    background: var(--surface-panel-bg);
    border-right: 1px solid var(--surface-border);
  }
  .form-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  h1 { font-size: 18px; margin: 0 0 4px; color: var(--navy); }
  .hint { font-size: 12px; color: var(--surface-text-muted); margin: 0 0 16px; line-height: 1.6; }
  #theme-toggle {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--surface-border); background: var(--surface-input-bg);
    font-size: 16px; cursor: pointer; line-height: 1; padding: 0; color: var(--surface-text);
  }
  fieldset { border: 1px solid var(--surface-border); border-radius: 8px; margin-bottom: 16px; padding: 12px 14px; }
  legend { font-size: 12px; font-weight: 700; color: var(--navy); padding: 0 4px; }
  label { display: block; font-size: 12px; color: var(--surface-text-muted); margin: 10px 0 4px; }
  label:first-of-type { margin-top: 4px; }
  input[type=text], input[type=date], input[type=number], select, textarea {
    width: 100%; padding: 6px 8px; font-size: 13px;
    border: 1px solid var(--surface-input-border); border-radius: 6px; font-family: inherit;
    background: var(--surface-input-bg); color: var(--surface-text);
  }
  textarea { resize: vertical; min-height: 50px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  button {
    cursor: pointer; border: 1px solid var(--navy); background: var(--navy); color: #fff;
    border-radius: 6px; padding: 8px 12px; font-size: 13px;
  }
  button.secondary { background: #fff; color: var(--navy); }
  :root[data-theme="dark"] button.secondary { background: var(--surface-input-bg); color: var(--surface-text); }
  button.full { width: 100%; margin-top: 8px; }
  #import-btn { margin-bottom: 16px; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .status { margin-top: 8px; font-size: 12px; color: var(--surface-text-muted); min-height: 18px; }

  .main-panel { flex: 1; overflow-y: auto; padding: 24px; }
  .summary-bar {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px;
  }
  .summary-bar label { font-size: 12px; color: var(--surface-text-muted); margin: 0 0 4px; }
  .summary-bar select, .summary-bar input { width: 140px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card {
    background: var(--surface-panel-bg); border: 1px solid var(--surface-border);
    border-radius: 10px; padding: 14px 16px;
  }
  .card .label { font-size: 12px; color: var(--surface-text-muted); margin-bottom: 6px; }
  .card .value { font-size: 20px; font-weight: 700; color: var(--navy); }
  .card.unpaid .value { color: var(--orange); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--surface-panel-bg); border-radius: 10px; overflow: hidden; }
  th { background: var(--navy); color: #fff; padding: 8px 10px; text-align: left; font-size: 12px; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--surface-border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tag.paid { background: #E6F4EA; color: #1E7B34; }
  .tag.overdue { background: #FDECEC; color: #C0392B; }
  .tag.invoiced_unpaid { background: #E8EEFB; color: var(--navy); }
  .tag.pending_invoice { background: #F1F1F1; color: var(--surface-text-muted); }
  .cell-muted { color: var(--surface-text-muted); }
  .row-actions { display: flex; gap: 6px; }
  .row-actions button { padding: 4px 8px; font-size: 11px; }
  .empty-row td { text-align: center; color: var(--surface-text-muted); padding: 30px 10px; }
</style>
</head>
<body>
<div class="app">

  <div class="form-panel">
    <div class="form-head">
      <div>
        <h1>接案收入登記</h1>
        <p class="hint">登記每筆案件的金額、發票號碼／開立日期、預計與實際收款日，讓案件、發票、收款時間能互相對得上，並依月／年彙整報稅用收入。</p>
      </div>
      <button id="theme-toggle" type="button" aria-label="切換 Dark／Day 模式" title="切換深色／淺色模式">🌙</button>
    </div>

    <input type="file" id="import-file" accept=".json,application/json" style="display:none">
    <button type="button" class="full secondary" id="import-btn">匯入請款單 JSON</button>

    <form id="form">
      <input type="hidden" id="f_id">
      <fieldset>
        <legend>案件資訊</legend>
        <label>案件名稱</label>
        <input type="text" id="f_project" placeholder="企業網站改版">
        <label>客戶名稱</label>
        <input type="text" id="f_client" placeholder="全穎智聯股份有限公司">
        <label>應收金額</label>
        <input type="number" id="f_amount" placeholder="50000" min="0" step="1">
      </fieldset>

      <fieldset>
        <legend>發票對應</legend>
        <div class="row2">
          <div>
            <label>發票號碼</label>
            <input type="text" id="f_invoice_no" placeholder="AB-12345678">
          </div>
          <div>
            <label>開立日期</label>
            <input type="date" id="f_invoice_date">
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>收款時間</legend>
        <div class="row2">
          <div>
            <label>預計收款日</label>
            <input type="date" id="f_due_date">
          </div>
          <div>
            <label>實際收款日</label>
            <input type="date" id="f_paid_date">
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>備註</legend>
        <textarea id="f_note" placeholder="付款方式、合約期間等備註"></textarea>
      </fieldset>

      <button type="button" class="full" id="save-btn">儲存登記</button>
      <button type="button" class="full secondary" id="reset-btn">清空表單</button>
    </form>
    <div class="status" id="status">狀態：待命中</div>
  </div>

  <div class="main-panel">
    <div class="summary-bar">
      <div>
        <label>年度</label>
        <select id="filter-year"><option value="">全部</option></select>
      </div>
      <div>
        <label>月份</label>
        <select id="filter-month">
          <option value="">全部</option>
        </select>
      </div>
      <button type="button" class="secondary" id="export-btn">匯出 CSV（報稅用）</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="label">筆數</div>
        <div class="value" id="sum-count">0</div>
      </div>
      <div class="card">
        <div class="label">總收入</div>
        <div class="value" id="sum-total">NT$ 0</div>
      </div>
      <div class="card">
        <div class="label">已收款</div>
        <div class="value" id="sum-paid">NT$ 0</div>
      </div>
      <div class="card unpaid">
        <div class="label">未收款</div>
        <div class="value" id="sum-unpaid">NT$ 0</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>狀態</th>
          <th>案件名稱</th>
          <th>客戶</th>
          <th>金額</th>
          <th>發票號碼</th>
          <th>開立日期</th>
          <th>預計收款日</th>
          <th>實際收款日</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="list-tbody">
        <tr class="empty-row"><td colspan="9">尚無登記紀錄</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const API_BASE = "http://localhost:8780";
let records = [];

/* ---- Dark / Day 模式 ---- */
(function () {
  var root = document.documentElement;
  var btn = document.getElementById('theme-toggle');
  var saved = null;
  try { saved = localStorage.getItem('dghm-income-tracker-theme'); } catch (e) {}
  if (saved === 'dark') {
    root.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  } else {
    btn.textContent = '🌙';
  }
  btn.addEventListener('click', function () {
    var isDark = root.getAttribute('data-theme') === 'dark';
    if (isDark) {
      root.removeAttribute('data-theme');
      btn.textContent = '🌙';
      try { localStorage.setItem('dghm-income-tracker-theme', 'light'); } catch (e) {}
    } else {
      root.setAttribute('data-theme', 'dark');
      btn.textContent = '☀️';
      try { localStorage.setItem('dghm-income-tracker-theme', 'dark'); } catch (e) {}
    }
  });
})();

function setStatus(text) {
  document.getElementById('status').textContent = `狀態：${text}`;
}

function fmtNT(n) {
  return 'NT$ ' + Math.round(n || 0).toLocaleString('zh-TW');
}

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function v(id) {
  return (document.getElementById(id) || {}).value || '';
}

const STATUS_LABELS = {
  pending_invoice: '待開票',
  invoiced_unpaid: '已開票待收',
  overdue: '逾期未收',
  paid: '已收款',
};

function statusOf(r) {
  if (r.paidDate) return 'paid';
  if (r.invoiceDate) {
    const today = new Date().toISOString().slice(0, 10);
    if (r.dueDate && r.dueDate < today) return 'overdue';
    return 'invoiced_unpaid';
  }
  return 'pending_invoice';
}

function referenceDate(r) {
  return r.paidDate || r.dueDate || r.invoiceDate || (r.createdAt ? r.createdAt.slice(0, 10) : '');
}

function clearForm() {
  document.getElementById('f_id').value = '';
  document.getElementById('f_project').value = '';
  document.getElementById('f_client').value = '';
  document.getElementById('f_amount').value = '';
  document.getElementById('f_invoice_no').value = '';
  document.getElementById('f_invoice_date').value = '';
  document.getElementById('f_due_date').value = '';
  document.getElementById('f_paid_date').value = '';
  document.getElementById('f_note').value = '';
}

async function loadRecords() {
  setStatus('讀取中...');
  try {
    const res = await fetch(`${API_BASE}/api/income/list`);
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || '讀取失敗');
    records = data.records || [];
    populateFilterOptions();
    renderTable();
    setStatus('就緒');
  } catch (err) {
    setStatus(`讀取失敗：${err.message}（請確認 tool-api-server.js 是否已啟動）`);
  }
}

function populateFilterOptions() {
  const years = Array.from(new Set(records.map((r) => referenceDate(r).split('-')[0]).filter(Boolean))).sort().reverse();
  const yearSelect = document.getElementById('filter-year');
  const currentYear = yearSelect.value;
  yearSelect.innerHTML = '<option value="">全部</option>' + years.map((y) => `<option value="${y}">${y}</option>`).join('');
  yearSelect.value = years.includes(currentYear) ? currentYear : '';

  const monthSelect = document.getElementById('filter-month');
  if (!monthSelect.dataset.init) {
    let opts = '<option value="">全部</option>';
    for (let m = 1; m <= 12; m++) {
      const mm = String(m).padStart(2, '0');
      opts += `<option value="${mm}">${m} 月</option>`;
    }
    monthSelect.innerHTML = opts;
    monthSelect.dataset.init = '1';
  }
}

function getFilteredRecords() {
  const year = v('filter-year');
  const month = v('filter-month');
  return records.filter((r) => {
    const ref = referenceDate(r);
    if (!ref) return false;
    const [y, m] = ref.split('-');
    if (year && y !== year) return false;
    if (month && m !== month) return false;
    return true;
  });
}

function renderTable() {
  const filtered = getFilteredRecords().slice().sort((a, b) => referenceDate(b).localeCompare(referenceDate(a)));
  const tbody = document.getElementById('list-tbody');

  let total = 0, paid = 0;
  filtered.forEach((r) => {
    total += Number(r.amount) || 0;
    if (statusOf(r) === 'paid') paid += Number(r.amount) || 0;
  });
  document.getElementById('sum-count').textContent = filtered.length;
  document.getElementById('sum-total').textContent = fmtNT(total);
  document.getElementById('sum-paid').textContent = fmtNT(paid);
  document.getElementById('sum-unpaid').textContent = fmtNT(total - paid);

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">尚無登記紀錄</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((r) => {
    const status = statusOf(r);
    return `
    <tr>
      <td><span class="tag ${status}">${STATUS_LABELS[status]}</span></td>
      <td>${esc(r.project)}</td>
      <td>${esc(r.client)}</td>
      <td>${fmtNT(r.amount)}</td>
      <td>${r.invoiceNo ? esc(r.invoiceNo) : '<span class="cell-muted">—</span>'}</td>
      <td>${r.invoiceDate ? esc(r.invoiceDate) : '<span class="cell-muted">—</span>'}</td>
      <td>${r.dueDate ? esc(r.dueDate) : '<span class="cell-muted">—</span>'}</td>
      <td>${r.paidDate ? esc(r.paidDate) : '<span class="cell-muted">—</span>'}</td>
      <td>
        <div class="row-actions">
          <button type="button" class="secondary" onclick="editRecord('${r.id}')">編輯</button>
          <button type="button" class="secondary" onclick="openInvoice('${r.id}')">產生請款單</button>
          <button type="button" class="secondary" onclick="deleteRecord('${r.id}')">刪除</button>
        </div>
      </td>
    </tr>
  `;
  }).join('');
}

function editRecord(id) {
  const r = records.find((x) => x.id === id);
  if (!r) return;
  document.getElementById('f_id').value = r.id;
  document.getElementById('f_project').value = r.project;
  document.getElementById('f_client').value = r.client;
  document.getElementById('f_amount').value = r.amount;
  document.getElementById('f_invoice_no').value = r.invoiceNo || '';
  document.getElementById('f_invoice_date').value = r.invoiceDate || '';
  document.getElementById('f_due_date').value = r.dueDate || '';
  document.getElementById('f_paid_date').value = r.paidDate || '';
  document.getElementById('f_note').value = r.note || '';
  setStatus(`編輯中：${r.project}`);
}

function openInvoice(id) {
  const r = records.find((x) => x.id === id);
  if (!r) return;
  const params = new URLSearchParams({
    company: r.client || '',
    project: r.project || '',
    amount: r.amount || '',
    date: r.invoiceDate || r.dueDate || '',
    invoiceNo: r.invoiceNo || '',
  });
  window.open(`Invoice-Generator.html?${params.toString()}`, '_blank');
  setStatus('已開啟請款單產生器，開立後請回來填入發票號碼／開立日期，讓案件與發票對得上');
}

async function deleteRecord(id) {
  if (!confirm('確定要刪除這筆登記紀錄嗎？')) return;
  setStatus('刪除中...');
  try {
    const res = await fetch(`${API_BASE}/api/income/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || '刪除失敗');
    await loadRecords();
    setStatus('已刪除');
  } catch (err) {
    setStatus(`刪除失敗：${err.message}`);
  }
}

async function saveRecord() {
  const id = v('f_id');
  const payload = {
    project: v('f_project').trim(),
    client: v('f_client').trim(),
    amount: Number(v('f_amount')),
    invoiceNo: v('f_invoice_no').trim(),
    invoiceDate: v('f_invoice_date'),
    dueDate: v('f_due_date'),
    paidDate: v('f_paid_date'),
    note: v('f_note').trim(),
  };

  if (!payload.project || !payload.client || !payload.amount) {
    setStatus('請完整填寫案件名稱、客戶與金額');
    return;
  }

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  setStatus('儲存中...');
  try {
    const url = id ? `${API_BASE}/api/income/update` : `${API_BASE}/api/income/create`;
    const body = id ? { ...payload, id } : payload;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || '儲存失敗');
    clearForm();
    await loadRecords();
    setStatus('已儲存');
  } catch (err) {
    setStatus(`儲存失敗：${err.message}`);
  } finally {
    saveBtn.disabled = false;
  }
}

function exportCsv() {
  const filtered = getFilteredRecords().slice().sort((a, b) => referenceDate(a).localeCompare(referenceDate(b)));
  if (filtered.length === 0) {
    setStatus('目前篩選範圍內沒有資料可匯出');
    return;
  }
  const header = ['案件名稱', '客戶', '金額', '發票號碼', '開立日期', '預計收款日', '實際收款日', '狀態', '備註'];
  const rows = filtered.map((r) => [
    r.project,
    r.client,
    r.amount,
    r.invoiceNo || '',
    r.invoiceDate || '',
    r.dueDate || '',
    r.paidDate || '',
    STATUS_LABELS[statusOf(r)],
    r.note || '',
  ]);
  const csv = [header, ...rows]
    .map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const year = v('filter-year') || '全部年度';
  const month = v('filter-month') ? `-${v('filter-month')}月` : '';
  a.download = `接案收入登記-${year}${month}.csv`;
  a.click();
  setStatus('已匯出 CSV');
}

function importInvoiceJson(json) {
  const f = json.fields || {};
  const items = Array.isArray(json.items) ? json.items : [];
  const total = items.reduce((sum, it) => sum + (Number(it.price) || 0), 0);
  clearForm();
  document.getElementById('f_project').value = f.f_project_name || '';
  document.getElementById('f_client').value = f.f_company_name || '';
  document.getElementById('f_amount').value = total || '';
  document.getElementById('f_invoice_no').value = f.f_inv_no || '';
  document.getElementById('f_invoice_date').value = f.f_issue_date || '';
  document.getElementById('f_due_date').value = f.f_due_date || '';
  document.getElementById('f_note').value = f.f_inv_number ? `統一發票號碼：${f.f_inv_number}` : '';
}

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = JSON.parse(await file.text());
    importInvoiceJson(json);
    setStatus('已匯入請款單資料，請確認金額與日期後按「儲存登記」');
  } catch (err) {
    setStatus(`匯入失敗：${err.message}`);
  }
  e.target.value = '';
});

document.getElementById('save-btn').addEventListener('click', saveRecord);
document.getElementById('reset-btn').addEventListener('click', () => { clearForm(); setStatus('已清空表單'); });
document.getElementById('export-btn').addEventListener('click', exportCsv);
document.getElementById('filter-year').addEventListener('change', renderTable);
document.getElementById('filter-month').addEventListener('change', renderTable);

loadRecords();
</script>
</body>
</html>
