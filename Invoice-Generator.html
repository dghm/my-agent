<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGHM 應收帳款通知產生器</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --navy: #0D2F6E;
    --orange: #E5622A;
    --surface-bg: #F4F6F8;
    --surface-panel-bg: #ffffff;
    --surface-border: #E1E5EA;
    --surface-text: #1f2933;
    --surface-text-muted: #667085;
    --surface-input-bg: #ffffff;
    --surface-input-border: #D0D5DD;
    --surface-tab-bg: #ffffff;
    --surface-tab-text: #475467;
  }
  :root[data-theme="dark"] {
    --surface-bg: #161b22;
    --surface-panel-bg: #1f2530;
    --surface-border: #323a47;
    --surface-text: #e6e9ef;
    --surface-text-muted: #9aa4b2;
    --surface-input-bg: #2a313d;
    --surface-input-border: #3d4654;
    --surface-tab-bg: #2a313d;
    --surface-tab-text: #c4cbd6;
  }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    margin: 0;
    background: var(--surface-bg);
    color: var(--surface-text);
  }
  .app { display: flex; height: 100vh; }

  /* ---- Form panel ---- */
  .form-panel {
    width: 460px;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 20px;
    background: var(--surface-panel-bg);
    border-right: 1px solid var(--surface-border);
  }
  .form-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  h1 { font-size: 18px; margin: 0 0 4px; color: var(--navy); }
  .hint { font-size: 12px; color: var(--surface-text-muted); margin: 0 0 16px; line-height: 1.6; }
  #theme-toggle {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--surface-border); background: var(--surface-input-bg);
    font-size: 16px; cursor: pointer; line-height: 1; padding: 0;
  }
  fieldset { border: 1px solid var(--surface-border); border-radius: 8px; margin-bottom: 16px; padding: 12px 14px; }
  legend { font-size: 12px; font-weight: 700; color: var(--navy); padding: 0 4px; }
  label { display: block; font-size: 12px; color: var(--surface-text-muted); margin: 10px 0 4px; }
  label:first-of-type { margin-top: 4px; }
  input[type=text], input[type=date], input[type=number], textarea {
    width: 100%; padding: 6px 8px; font-size: 13px;
    border: 1px solid var(--surface-input-border); border-radius: 6px; font-family: inherit;
    background: var(--surface-input-bg); color: var(--surface-text);
  }
  textarea { resize: vertical; min-height: 54px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ---- Items table (form side) ---- */
  .items-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 8px; }
  .items-table th { background: var(--navy); color: #fff; padding: 6px 8px; text-align: left; font-size: 0.7rem; }
  .items-table td { padding: 5px 5px; border-bottom: 1px solid var(--surface-border); vertical-align: middle; }
  .items-table td input {
    width: 100%; border: 1px solid var(--surface-input-border); border-radius: 4px;
    padding: 4px 6px; font-family: inherit; font-size: 12px;
    background: var(--surface-input-bg); color: var(--surface-text);
  }
  .items-table td.td-num { width: 28px; text-align: center; font-weight: 700; color: var(--navy); }
  .items-table td.td-price input { text-align: right; }
  .items-table td.td-del { text-align: center; width: 28px; }
  .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1rem; padding: 2px 4px; }
  .btn-del:hover { color: #e53935; }
  .btn-add {
    display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
    background: none; border: 1px dashed var(--surface-input-border); color: var(--surface-text-muted);
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .btn-add:hover { border-color: var(--navy); color: var(--navy); }
  .totals-preview { margin-top: 6px; }
  .totals-preview table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .totals-preview td { padding: 4px 8px; }
  .totals-preview td:last-child { text-align: right; font-weight: 600; }
  .totals-preview .sub-row td { color: var(--surface-text-muted); font-size: 0.78rem; }
  .totals-preview .total-row td { background: var(--navy); color: #fff; font-weight: 700; }
  .totals-preview .total-row td:last-child { font-size: 1rem; }

  /* ---- Buttons ---- */
  button {
    cursor: pointer; border: 1px solid var(--navy); background: var(--navy); color: #fff;
    padding: 6px 12px; border-radius: 6px; font-size: 12px;
  }
  button.secondary { background: var(--surface-input-bg); color: var(--navy); border-color: var(--surface-border); }
  button.secondary:hover { border-color: var(--navy); }

  /* ---- Output panel ---- */
  .output-panel { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
  .tabs { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .tab-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--surface-border);
    background: var(--surface-tab-bg); font-size: 13px; cursor: pointer; color: var(--surface-tab-text);
  }
  .tab-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .output-actions { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
  .copy-status { font-size: 12px; color: #1a7f4b; font-weight: 600; }
  .output-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .output-view.hidden { display: none; }
  #out-html {
    flex: 1; width: 100%; font-family: "SF Mono", Menlo, monospace; font-size: 12px;
    border: 1px solid var(--surface-input-border); border-radius: 8px; padding: 12px; resize: none;
    background: var(--surface-input-bg); color: var(--surface-text);
  }
  #preview-frame { flex: 1; width: 100%; border: 1px solid var(--surface-border); border-radius: 8px; background: #fff; }
</style>
</head>

  .banner-label { position: absolute; right: 6%; top: 72%; transform: translateY(-50%); color: #fff; font-weight: 400; font-size: 1.5rem; letter-spacing: 1px; white-space: nowrap; }
  .inv-header-body { background: white; color: var(--navy); padding: 5mm 14mm 4mm; position: relative; }
  .inv-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; font-size: 0.78rem; line-height: 1.9; margin-bottom: 4mm; }
  .inv-meta-grid .col-right { text-align: right; }
  .inv-meta-item .label { color: var(--gray); }
  .inv-meta-item .value { font-weight: 600; color: var(--navy); }
  .inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 0 2mm; }
  .inv-party-box .role { width: fit-content; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); font-weight: 700; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 2px solid var(--orange); display: inline-block; }
  .inv-party-box .company { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
  .inv-party-box .detail { font-size: 0.78rem; color: var(--gray); line-height: 1.7; }
  .inv-section { padding: 2mm 14mm 3mm; }
  .inv-section-title { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); font-weight: 700; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 2px solid var(--orange); display: inline-block; }
  .inv-items-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .inv-items-table thead tr { background: var(--navy); color: #fff; }
  .inv-items-table thead th { padding: 6px 10px; text-align: left; font-weight: 600; font-size: 0.75rem; }
  .inv-items-table thead th:last-child { text-align: right; }
  .inv-items-table tbody tr:nth-child(even) { background: var(--bg); }
  .inv-items-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .inv-items-table td.num { width: 6%; font-weight: 700; color: var(--navy); text-align: center; }
  .inv-items-table td.name { width: 22%; font-weight: 700; color: var(--navy); }
  .inv-items-table td.desc { color: var(--ink); font-size: 0.8rem; }
  .inv-items-table td.price { text-align: right; font-weight: 700; color: var(--navy); white-space: nowrap; width: 16%; }
  .inv-totals-wrap { display: flex; justify-content: flex-end; margin-top: 3px; }
  .inv-totals-table { width: 42%; border-collapse: collapse; font-size: 0.85rem; }
  .inv-totals-table td { padding: 5px 10px; }
  .inv-totals-table td:last-child { text-align: right; font-weight: 600; }
  .inv-totals-table .sub-row td { color: var(--gray); font-size: 0.8rem; }
  .inv-totals-table .total-row td { background: var(--navy); color: #fff; font-weight: 700; padding: 5px 10px; }
  .inv-totals-table .total-row td:last-child { font-size: 1.2rem; }
  .inv-terms-ol { margin: 5px 0 0; padding-left: 16px; font-size: 0.68rem; color: var(--gray); line-height: 1.7; }
  .inv-terms-ol li { margin-bottom: 1px; }
  .page-footer { position: absolute; bottom: 0; left: 0; right: 0; background: var(--navy); color: rgba(255,255,255,0.6); padding: 8px 14mm; font-size: 0.72rem; display: flex; justify-content: space-between; align-items: center; }
  .page-footer strong { color: #fff; }
</style>

<div class="app">

  <!-- ============ FORM PANEL ============ -->
  <div class="form-panel">
    <div class="form-head">
      <div>
        <h1>應收帳款通知產生器</h1>
        <p class="hint">填寫請款資訊，右側會即時產生 A4 列印用的應收帳款通知 HTML，可直接預覽、複製或下載。</p>
      </div>
      <button id="theme-toggle" type="button" aria-label="切換 Dark／Day 模式" title="切換深色／淺色模式">🌙</button>
    </div>

    <form id="form">

      <fieldset>
        <legend>01 — 文件識別</legend>

        <input type="text" id="f_company_name" placeholder="全穎智聯股份有限公司">

        <label>專案名稱 Project Name</label>
        <input type="text" id="f_project_name" placeholder="網站伺服器空間租用 1 年期">
      </fieldset>

      <fieldset>
        <legend>02 — 單據資訊</legend>
        <div class="row2">
          <div>
            <label>通知單號 INV No.</label>
            <input type="text" id="f_inv_no" placeholder="INV-2605-05">
          </div>
          <div>
            <label>專案代碼 DH-XX-PJX</label>
            <input type="text" id="f_proj_code" placeholder="DH-08-PJ1">
          </div>
        </div>

        <label>付款條件 Payment Terms</label>
        <input type="text" id="f_payment_terms" placeholder="Net 30">

        <div class="row2">
          <div>
            <label>開立日期 Issue Date</label>
            <input type="date" id="f_issue_date">
          </div>
          <div>
            <label>付款期限 Due Date</label>
            <input type="date" id="f_due_date">
          </div>
        </div>

        <label>發票號碼 Invoice Number</label>
        <input type="text" id="f_inv_number" placeholder="AB 12345678">
      </fieldset>

      <fieldset>
        <legend>03 — 請款對象</legend>
        <label>地址 Company Address</label>
        <input type="text" id="f_address" placeholder="新北市土城區莊園街 151 號 2 樓 B09 室">

        <input type="text" id="f_vat" placeholder="90832639">

        <div class="row2">
          <div>
            <label>聯絡人 Company Contact</label>
            <input type="text" id="f_contact" placeholder="許家豪">
          </div>
          <div>
            <label>電話 Company Phone</label>
            <input type="text" id="f_phone" placeholder="02-1234-5678">
          </div>
        </div>

        <label>Email Company Email</label>

      </fieldset>

      <fieldset>
        <legend>04 — 請款明細</legend>
        <table class="items-table">
          <thead>
            <tr>
              <th style="width:28px">#</th>
              <th style="width:26%">項目名稱</th>
              <th>說明</th>
              <th style="width:120px">金額未稅 (NT$)</th>
              <th style="width:28px"></th>
            </tr>

          <tbody id="items-tbody"></tbody>
        </table>
        <button type="button" class="btn-add" onclick="addItem()">＋ 新增項目</button>

        <div class="totals-preview">
          <table>
            <tbody>
              <tr class="sub-row"><td>未稅小計</td><td id="tpl-subtotal">NT$ 0</td></tr>
              <tr class="sub-row"><td>營業稅 5%</td><td id="tpl-tax">NT$ 0</td></tr>
              <tr class="total-row"><td>請款總額（含稅）</td><td id="tpl-total">NT$ 0</td></tr>
            </tbody>
          </table>
        </div>
      </fieldset>

      <fieldset>
        <legend>05 — 條款說明</legend>
        <label>第 1 條 Term 1</label>
        <textarea id="f_term1" rows="3" placeholder="本文件為…正式請款憑證。"></textarea>

        <label>第 2 條 Term 2</label>
        <textarea id="f_term2" rows="3" placeholder="匯款後請提供末五碼與匯款時間…"></textarea>
      </fieldset>

      <fieldset>
        <legend>06 — 分頁設定</legend>
        <div class="row2">
          <div>
            <label>當前頁碼 Page No.</label>
            <input type="text" id="f_page_no" value="2">
          </div>
          <div>
            <label>總頁數 Page Total</label>
            <input type="text" id="f_page_total" value="2">
          </div>
        </div>
      </fieldset>

    </form>
  </div>

  <!-- ============ OUTPUT PANEL ============ -->
  <div class="output-panel">
    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="preview">即時預覽</button>
      <button type="button" class="tab-btn" data-tab="html">HTML 原始碼</button>
    </div>
    <div class="output-actions">
      <button type="button" class="secondary" id="copy-btn">複製 HTML</button>
      <button type="button" class="secondary" id="download-btn">下載 HTML</button>
      <button type="button" class="secondary" id="open-btn">在新視窗開啟／列印</button>
      <span class="copy-status" id="copy-status"></span>
    </div>
    <div class="output-view" id="view-preview">
      <iframe id="preview-frame"></iframe>
    </div>
    <div class="output-view hidden" id="view-html">
      <textarea id="out-html" readonly spellcheck="false"></textarea>
    </div>
  </div>

</div>

<script>
/* ============================================================
   Dark / Day 模式（僅編輯介面，產出的應收帳款通知文件樣式不受影響）
   ============================================================ */
(function () {
  var root = document.documentElement;
  var btn = document.getElementById('theme-toggle');
  var saved = null;
  try { saved = localStorage.getItem('dghm-invoice-editor-theme'); } catch (e) {}
  if (saved === 'dark') {
    root.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  } else {
    btn.textContent = '🌙';
  }
  btn.addEventListener('click', function () {
    var isDark = root.getAttribute('data-theme') === 'dark';
    if (isDark) {
      root.removeAttribute('data-theme');
      btn.textContent = '🌙';
      try { localStorage.setItem('dghm-invoice-editor-theme', 'light'); } catch (e) {}
    } else {
      root.setAttribute('data-theme', 'dark');
      btn.textContent = '☀️';
      try { localStorage.setItem('dghm-invoice-editor-theme', 'dark'); } catch (e) {}
    }
  });
})();

/* ============================================================
   Tabs
   ============================================================ */
document.querySelectorAll('.tab-btn').forEach(function (btn) {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
    document.querySelectorAll('.output-view').forEach(function (v) { v.classList.add('hidden'); });
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.remove('hidden');
  });
});

/* ============================================================
   請款明細項目
   ============================================================ */
let _uid = 0;

function addItem(name, desc, price) {
  _uid++;
  const id = 'ir' + _uid;
  const tbody = document.getElementById('items-tbody');
  const tr = document.createElement('tr');
  tr.id = id;
  tr.innerHTML =
    '<td class="td-num"></td>' +
    '<td><input placeholder="項目名稱" value="' + esc(name||'') + '" oninput="refreshOutput()"></td>' +
    '<td><input placeholder="說明（期間、規格等）" value="' + esc(desc||'') + '" oninput="refreshOutput()"></td>' +
    '<td class="td-price"><input type="number" placeholder="0" min="0" step="1" value="' + (price||'') + '" oninput="refreshOutput()" style="text-align:right"></td>' +
    '<td class="td-del"><button type="button" class="btn-del" onclick="removeItem(\'' + id + '\')">✕</button></td>';
  tbody.appendChild(tr);
  renumber();
  refreshOutput();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function removeItem(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
  renumber();
  refreshOutput();
}

function renumber() {
  var rows = document.querySelectorAll('#items-tbody tr');
  for (var i = 0; i < rows.length; i++) {
    rows[i].querySelector('.td-num').textContent = i + 1;
  }
}

/* ============================================================
   產生文件 / 即時預覽
   ============================================================ */
function fmtNT(n) {
  return 'NT$ ' + Math.round(n).toLocaleString('zh-TW');
}

function v(id) {
  return (document.getElementById(id)||{}).value||'';
}

function fmtDate(s) {
  return s ? s.replace(/-/g, '/') : '';
}

function buildItemsTbody() {
  var rows = document.querySelectorAll('#items-tbody tr');
  var html = '';
  var sub = 0;
  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input');
    var name  = inputs[0].value;
    var desc  = inputs[1].value;
    var price = parseFloat(inputs[2].value) || 0;
    sub += price;
    html += '<tr><td class="num">' + (i+1) + '</td><td class="name">' + xmlEsc(name) + '</td><td class="desc">' + xmlEsc(desc) + '</td><td class="price">' + fmtNT(price) + '</td></tr>\n';
  }
  var tax = Math.round(sub * 0.05);
  var total = sub + tax;
  return { tbodyHtml: html, subtotal: fmtNT(sub), tax5: fmtNT(tax), totalInc: fmtNT(total) };
}

function xmlEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildDoc() {
  var tpl = document.getElementById('invTpl').textContent;
  var items = buildItemsTbody();

  tpl = tpl.replace('__ITEMS_TBODY__', items.tbodyHtml);

  document.getElementById('tpl-subtotal').textContent = items.subtotal;
  document.getElementById('tpl-tax').textContent = items.tax5;
  document.getElementById('tpl-total').textContent = items.totalInc;

  var map = {
    '{Company Name}':    v('f_company_name'),
    '{Project Name}':    v('f_project_name'),
    '{INV No.}':         v('f_inv_no'),
    '{DH-XX-PJX}':       v('f_proj_code'),
    '{Payment Terms}':   v('f_payment_terms'),
    '{Issue Date}':      fmtDate(v('f_issue_date')),
    '{Invoice Number}':  v('f_inv_number'),
    '{Due Date}':        fmtDate(v('f_due_date')),
    '{Company Address}': v('f_address'),
    '{VAT No.}':         v('f_vat'),
    '{Company Contact}': v('f_contact'),
    '{Company Phone}':   v('f_phone'),
    '{Company Email}':   v('f_email'),
    '{Subtotal Ex Tax}': items.subtotal,
    '{Tax 5%}':          items.tax5,
    '{Total Inc Tax}':   items.totalInc,
    '{Term 1}':          v('f_term1'),
    '{Term 2}':          v('f_term2'),
    '{Page No.}':        v('f_page_no'),
    '{Page Total}':      v('f_page_total'),
  };

  for (var ph in map) {
    tpl = tpl.split(ph).join(map[ph]);
  }
  return tpl;
}

function refreshOutput() {
  var html = buildDoc();
  document.getElementById('preview-frame').srcdoc = html;
  document.getElementById('out-html').value = html;
}

function previewDoc() {
  var html = buildDoc();
  var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  window.open(URL.createObjectURL(blob), '_blank');
}

function generateDoc() {
  var html = buildDoc();
  var invNo   = v('f_inv_no')         || 'INV';
  var company = v('f_company_name')   || '客戶';
  var filename = invNo + '_' + company + '-應收帳款通知.html';
  var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* ============================================================
   按鈕與輸入事件綁定
   ============================================================ */
document.getElementById('open-btn').addEventListener('click', previewDoc);
document.getElementById('download-btn').addEventListener('click', generateDoc);
document.getElementById('copy-btn').addEventListener('click', function () {
  var status = document.getElementById('copy-status');
  navigator.clipboard.writeText(document.getElementById('out-html').value).then(function () {
    status.textContent = '已複製！';
    setTimeout(function () { status.textContent = ''; }, 1500);
  }, function () {
    status.textContent = '複製失敗，請手動選取後複製';
    setTimeout(function () { status.textContent = ''; }, 2000);
  });
});

document.querySelector('.form-panel').addEventListener('input', refreshOutput);

/* ============================================================
   初始化
   ============================================================ */
addItem();
refreshOutput();

/* ============================================================
   從收入登記系統帶入資料（?company=&project=&amount=&date=）
   ============================================================ */
(function () {
  var params = new URLSearchParams(window.location.search);
  var company = params.get('company');
  var project = params.get('project');
  var amount = params.get('amount');
  var date = params.get('date');
  if (!company && !project && !amount && !date) return;

  if (company) document.getElementById('f_company_name').value = company;
  if (project) document.getElementById('f_project_name').value = project;
  if (date) document.getElementById('f_issue_date').value = date;
  if (amount) {
    var firstRow = document.querySelector('#items-tbody tr');
    if (firstRow) {
      var nameInput = firstRow.children[1].querySelector('input');
      var priceInput = firstRow.querySelector('.td-price input');
      if (project && nameInput) nameInput.value = project;
      if (priceInput) priceInput.value = amount;
    }
  }
  refreshOutput();
})();
</script>
</body>
</html>
